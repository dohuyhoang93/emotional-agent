name: Experiment Orchestration (Flux)
version: 2.0.0
description: "Declarative Workflow using Theus Flux Engine."

steps:
  - process: load_config
  
  # Experiment Loop
  - flux: while
    condition: "domain.active_experiment_idx < len(domain.experiments)"
    do:
       # Initialize Runner
       - process: initialize_active_experiment
       
       # Episode Loop
       - flux: while
         # condition: "domain.experiments[domain.active_experiment_idx].runner and domain.experiments[domain.active_experiment_idx].runner.current_episode_count < domain.experiments[domain.active_experiment_idx].episodes_per_run"
         # Accessing deeply nested objects in restricted eval can be verbose/fragile.
         # Safer to rely on runner state if accessible or Helper Process return value?
         # Or alias helper?
         # Let's try the verbose path first.
         condition: "domain.experiments[domain.active_experiment_idx].runner.current_episode_count < domain.experiments[domain.active_experiment_idx].episodes_per_run"
         do:
            - process: run_single_episode
            - process: decay_exploration_all_agents  # FIX: Decay epsilon 1 lần/episode (không phải mỗi step)
            - process: enrich_episode_metrics
            - process: log_episode_metrics
            
            # Event checks BEFORE advancing episode (so count is correct)
            # Social Learning Trigger (Every 25 eps)
            - flux: if
              condition: "domain.experiments[domain.active_experiment_idx].runner.current_episode_count > 0 and domain.experiments[domain.active_experiment_idx].runner.current_episode_count % 25 == 0"
              then:
                 - process: execute_social_learning_if_needed
            
            # Sleep Cycle (Every 25 eps, same phase as social)
            - flux: if
              condition: "domain.experiments[domain.active_experiment_idx].runner.current_episode_count > 0 and domain.experiments[domain.active_experiment_idx].runner.current_episode_count % 25 == 0"
              then:
                 - process: run_sleep_cycle_process

            # Revolution Protocol (Every 100 eps)
            - flux: if
              # Check cooldown in Condition or Process? 
              # Process 'perform_revolution_protocol' checks config 'revolution_manager' internally.
              # So we can just call it periodically.
              # Check every 100 episodes to align with revolution_window.
              condition: "domain.experiments[domain.active_experiment_idx].runner.current_episode_count > 0 and domain.experiments[domain.active_experiment_idx].runner.current_episode_count % 100 == 0"
              then:
                 - process: perform_revolution_protocol

            # Periodic Checkpoint (Every 50 eps - logic inside process currently)
            - process: save_periodic_checkpoint
            
            # NOW advance episode for next iteration
            - process: advance_episode_index
            - process: save_metrics_snapshot
             
       # Advance to next Experiment
       - process: advance_experiment_index
  - process: aggregate_results
  - process: plot_results
  - process: analyze_data
  - process: save_summary
