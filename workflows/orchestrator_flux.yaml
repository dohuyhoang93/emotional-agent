name: Experiment Orchestration (Flux)
version: 2.1.0
description: "Declarative Workflow using Theus Flux Engine (Signal-Based Control)."

steps:
  - process: load_config
  
  # Experiment Loop (Signal-Based)
  - flux: while
    condition: "domain['sig_experiment_active_idx'] < domain['sig_total_experiments']"
    do:
       # Initialize Runner & Signals
       - process: initialize_active_experiment
       
       # Episode Loop (Signal-Based)
       - flux: while
         # Clean comparison of integers!
         condition: "domain['sig_episode_counter'] < domain['sig_max_episodes']"
         do:
            - process: run_single_episode
            - process: decay_exploration_all_agents  # FIX: Decay epsilon 1 lần/episode (không phải mỗi step)
            - process: enrich_episode_metrics
            - process: log_episode_metrics
            
            # Event checks BEFORE advancing episode
            # Social Learning Trigger (Every 25 eps)
            - flux: if
              condition: "domain['sig_episode_counter'] > 0 and domain['sig_episode_counter'] % 25 == 0"
              then:
                 - process: execute_social_learning_if_needed
            
            # Sleep Cycle (Every 25 eps, same phase as social)
            - flux: if
              condition: "domain['sig_episode_counter'] > 0 and domain['sig_episode_counter'] % 25 == 0"
              then:
                 - process: prepare_sleep_cycle
                 
                 - flux: while
                   condition: "domain['sig_sleep_step'] < domain['sig_sleep_duration']"
                   do:
                      - process: execute_dream_step
                      - process: advance_sleep_step
                      
                 - process: finalize_sleep_cycle

            # Revolution Protocol (Every 100 eps)
            - flux: if
              condition: "domain['sig_episode_counter'] > 0 and domain['sig_episode_counter'] % 100 == 0"
              then:
                 - process: perform_revolution_protocol

            # Periodic Checkpoint (Every 50 eps)
            - process: save_periodic_checkpoint
            
            # NOW advance episode for next iteration (Increments sig_episode_counter)
            - process: advance_episode_index
            - process: save_metrics_snapshot
             
       # Advance to next Experiment (Increments sig_experiment_active_idx)
       - process: advance_experiment_index
  - process: aggregate_results
  - process: plot_results
  - process: analyze_data
  - process: save_summary
