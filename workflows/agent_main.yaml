name: "RL-SNN Agent Loop"
description: "Agent loop với SNN processing và intermediate rewards (16-dim sensor system)"

steps:
  # Perception (updated với sensor system)
  - perception
  
  # SNN Processing Pipeline
  # Phase 11: Safety & Robustness
  - monitor_safety_triggers
  
  # Phase 10: Top-Down Modulation
  - restore_snn_attention  # Elasticity (Return to baseline)
  - modulate_snn_attention # Top-down control (Action -> Threshold)

  # SNN Processing Pipeline (Composite Optimization)
  - process_snn_cycle
  
  # Fast Homeostasis (Every timestep)
  # Note: Conditional execution (every 10 steps) was tested but made performance worse
  # due to flux evaluation overhead. Keeping unconditional with lazy sync optimization.
  - process_homeostasis

  # Advanced Features (Post-Cycle)
  - process_commitment
  - process_neural_darwinism
  - process_assimilate_ancestor
  
  # RL Decision Making
  - compute_intrinsic_reward_snn # Novelty-based reward
  - combine_rewards              # Extrinsic + intrinsic
  - select_action_gated          # Emotion-gated action
  
  - process_inject_viral_with_quarantine # Filter blacklisted sources (Sandbox Entrance)
  - process_quarantine_validation # Validate viral synapses (Sandbox Exit)
  - process_meta_homeostasis_fixed # Slow Homeostasis (PID - Episode level)
  - process_periodic_resync        # Maintenance
  
  # Execution & Learning
  - execute_action_with_env
  - update_q_learning

  
  # Social Learning is handled by MultiAgentExperiment (Orchestrator level)
